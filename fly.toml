# fly.toml app configuration file generated for rowinbot-com on 2023-06-12T18:26:40+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "rowinbot-com"
primary_region = "cdg"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
interval = "15s"
timeout = "2s"
grace_period = "5s"
method = "GET"
path = "/"
